lane_tracker:
  ros__parameters:
    use_sim_time: true
    image_topic: /front_camera/image_raw
    image_topic_candidates:
      - /camera/image_raw
      - /front_camera/image_raw
      - /teknofest_araci/front_camera/image_raw
      - /teknofest_araci/camera/image_raw
    auto_discover_image_topic: false
    image_watchdog_seconds: 2.5
    topic_scan_period_seconds: 2.0
    lane_error_topic: /lane/error
    lane_valid_topic: /lane/valid
    debug_image_topic: /lane/debug
    publish_debug: true

    # Lower image region where lane lines are visible.
    roi_top_ratio: 0.55

    # White line threshold (HSV): low saturation, high value.
    white_value_min: 120
    white_sat_max: 80

    # Histogram lane extraction tuning.
    min_peak_pixels: 60
    expected_lane_width_px: 260

    # Smoother output for steering.
    smoothing_alpha: 0.35
