ekf_filter_node_odom:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.05
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    use_sim_time: true
    print_diagnostics: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    output_topic: /odometry/local

    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 30
    odom0_differential: false
    odom0_relative: false

    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 30
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

ekf_filter_node_map:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    use_sim_time: true
    print_diagnostics: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map
    output_topic: /odometry/global

    odom0: /odometry/local
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 30
    odom0_differential: false
    odom0_relative: false

    odom1: /odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 30
    odom1_differential: false
    odom1_relative: false
    odom1_pose_rejection_threshold: 2.0

    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 30
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 0.0
    transform_timeout: 0.5
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_cartesian_transform: false
    broadcast_cartesian_transform_as_parent_frame: false
    publish_filtered_gps: true
    use_odometry_yaw: true
    wait_for_datum: false
    use_sim_time: true
