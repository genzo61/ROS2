### ekf_node config ###
ekf_filter_node:
  ros__parameters:
    use_sim_time: true  # Simülasyon saati kullan (Çok önemli!)
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true    # Araç yerde gittiği için 2D mod (Z eksenini yoksay)
    
    # Frame İsimleri (Standartlara Uygun)
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint # Senin URDF'in ana kökü
    world_frame: odom # Local EKF için world frame 'odom' olur

    # --- SENSÖR 1: TEKERLEK ODOMETRİSİ ---
    odom0: /vehicle/odom
    odom0_config: [true,  true,  false,   # X, Y, Z
                   false, false, true,    # Roll, Pitch, Yaw
                   true,  false, false,   # dX, dY, dZ
                   false, false, true,    # dRoll, dPitch, dYaw
                   false, false, false]   # ddX, ddY, ddZ
    odom0_queue_size: 10
    odom0_differential: false

    # --- SENSÖR 2: IMU ---
    imu0: /vehicle/imu/data
    imu0_config: [false, false, false,   # X, Y, Z
                  true,  true,  true,    # Roll, Pitch, Yaw (Oryantasyon)
                  false, false, false,   # dX, dY, dZ
                  true,  true,  true,    # dRoll, dPitch, dYaw (Açısal Hız)
                  false, false, false]   # ddX, ddY, ddZ
    imu0_differential: false
    imu0_queue_size: 10
    
    # IMU verisi 'sensor_link'ten geliyor, EKF bunu 'base_footprint'e çevirecek.
    # Bunun için TF ağacının sağlam olması lazım (Robot State Publisher hallediyor).
